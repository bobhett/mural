<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js Custom Model and Marker</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam;">
      <!-- Define the 3D model asset -->
      <a-assets>
        <a-asset-item id="tinker" src="tinker.obj"></a-asset-item>
      </a-assets>

      <!-- Custom marker using the Colorado.patt pattern -->
      <a-marker type="pattern" url="Colorado.patt">
        <!-- 3D model entity with position, scale, and rotation adjustments -->
        <a-entity 
          obj-model="obj: #tinker" 
          position="0 0.5 0" 
          scale="0.05 0.05 0.05" 
          rotation="0 0 0">
        </a-entity>
      </a-marker>

      <!-- Camera entity -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
