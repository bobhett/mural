<!DOCTYPE html>
<html>
<head>
  <!-- Load A-Frame and AR.js NFT (for image tracking) -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <!-- Load aframe-extras for OBJ support -->
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    .arjs-loader {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .arjs-loader div { text-align: center; font-size: 1.25em; color: white; }
  </style>
</head>

<body style="margin: 0; overflow: hidden;">
  <!-- Loading screen -->
  <div class="arjs-loader">
    <div>Loading, please wait...</div>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <!-- Preload OBJ and MTL files -->
    <a-assets>
      <a-asset-item id="tinker" src="tinker.obj"></a-asset-item>
    </a-assets>

    <!-- Replace 'path/to/nft/descriptors' with the base URL of your generated NFT files -->
    <a-nft type="nft" url="sunflower_image" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
      <!-- Display the OBJ model -->
      <a-entity obj-model="obj: #tinker" scale="0.01 0.01 0.01" position="0 0.5 0"></a-entity>
    </a-nft>

    <!-- Camera -->
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
